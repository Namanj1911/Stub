<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- The 'Snapped, still lit' mark from icon.svg, translated to sit optically
       centred in the viewBox (the icon artwork's bbox is ~x13-94, y11-76).
       No background rect: the splash plugin's backgroundColor paints it. -->
  <defs>
    <radialGradient id="glow"><stop offset="0%" stop-color="#e8956b" stop-opacity="0.9"></stop><stop offset="100%" stop-color="#e8956b" stop-opacity="0"></stop></radialGradient>
    <linearGradient id="smoke" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#9184d9" stop-opacity="0.7"></stop><stop offset="100%" stop-color="#9184d9" stop-opacity="0"></stop></linearGradient>
  </defs>
  <g transform="translate(-3.5 6.5)">
    <g transform="rotate(14 35 62)"><rect x="14" y="54" width="18" height="15" rx="4" fill="#6d63a8"></rect><rect x="34" y="54" width="16" height="15" rx="4" fill="#e9e9ed"></rect></g>
    <g transform="rotate(-38 68 52)"><rect x="52" y="44" width="34" height="15" rx="4" fill="#e9e9ed"></rect></g>
    <path d="M83 33 C 74 27, 86 19, 76 11" fill="none" stroke="url(#smoke)" stroke-width="5" stroke-linecap="round"></path>
    <circle cx="83" cy="40" r="11" fill="url(#glow)"></circle>
    <circle cx="83" cy="40" r="4" fill="#e8956b"></circle>
    <circle cx="52" cy="65" r="2.5" fill="#9184d9"></circle>
    <circle cx="58" cy="72" r="2" fill="#9184d9" opacity="0.7"></circle>
    <circle cx="47" cy="74" r="1.6" fill="#9184d9" opacity="0.5"></circle>
  </g>
</svg>
