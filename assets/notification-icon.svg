<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Android notification icon: the 'Snapped, still lit' mark reduced to a
       flat white silhouette. Android masks this to the alpha channel and tints
       it with the plugin's `color`, so only the shape survives — every element
       that carried meaning through colour had to go or be redrawn:

       - The ember's radial glow flattens to a solid disc, and the ember dot
         itself merges invisibly into the tip it overlaps. Both dropped; in
         monochrome they cost detail and returned nothing.
       - The smoke wisp is a 5-unit stroke, ~1px once drawn at status-bar size.
         It read as fuzz, not smoke. Dropped, per Google's "no fine detail".
       - The filter band was a colour change, not a gap. Kept as a notch it
         read as wide as the break itself, so the mark looked like three
         loose chunks instead of one cigarette snapped in two. The lower half
         is now a single bar and the break is the only gap in the icon.

       Rotated -30 so the two pieces lie on the square's diagonal: the mark is
       long and thin, and the upright composition wasted the icon box. That
       rotation alone buys 26% more size at the same padding.

       Rasterize with rsvg-convert, never qlmanage — see the splash white-box
       post-mortem in BACKLOG.md:

         rsvg-convert -w 96 -h 96 assets/notification-icon.svg \
           -o assets/notification-icon.png
  -->
  <g transform="translate(-29.163 -27.704) scale(1.5560)">
    <g transform="rotate(-30 50 50)">
      <g fill="#fff">
        <g transform="rotate(14 35 62)">
          <rect x="14" y="54" width="36" height="15" rx="4"/>
        </g>
        <g transform="translate(3.2 -2.5)">
          <g transform="rotate(-38 68 52)">
            <rect x="52" y="44" width="34" height="15" rx="4"/>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
